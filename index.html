<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Guesser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <h1>Guess the quote</h1>
        <div class="quote-box">
            <div class="quote-area">
                <p id="quote1" class="quote"></p>
                <p id="quote2" class="quote"></p>
                <p id="quote3" class="quote"></p>
            </div>
            <div class="bottom">
                <div class="btn-wrapper">
                    <button id="next-round-btn" class="hidden">Next Round</button>
                </div>
                <div class="game-stats">
                    <span id="timer">Time: 30</span>
                </div>
            </div>
        </div>
        <div class="grid-container">
            <div class="card" data-name="Romeo" style="grid-area: c1"><h3>Romeo</h3></div>
            <div class="card" data-name="Juliet" style="grid-area: c2"><h3>Juliet</h3></div>
            <div class="card" data-name="Mercutio" style="grid-area: c3"><h3>Mercutio</h3></div>
            <div class="card" data-name="Benvolio" style="grid-area: c4"><h3>Benvolio</h3></div>
            <div class="card" data-name="Tybalt" style="grid-area: c5"><h3>Tybalt</h3></div>
            <div class="card" data-name="Friar Laurence" style="grid-area: c6"><h3>Friar Laurence</h3></div>
            <div class="card" data-name="Nurse" style="grid-area: c7"><h3>Nurse</h3></div>
            <div class="card" data-name="Lord Capulet" style="grid-area: c8"><h3>Lord Capulet</h3></div>
            <div class="card" data-name="Lady Capulet" style="grid-area: c9"><h3>Lady Capulet</h3></div>
            <div class="card" data-name="Paris" style="grid-area: c10"><h3>Paris</h3></div>
            <div class="card fake-card" data-name="fake" style="grid-area: fake"><h3></h3></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
